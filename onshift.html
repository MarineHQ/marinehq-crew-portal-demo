<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marine HQ — Crew on Shift</title>
<style>
  :root{--navy:#1A2B5C;--navy2:#1B3A5C;--orange:#E87722;--ink:#22303f;--muted:#6b7a8d;--line:#e3e8ef;--bg:#f4f6f9;--ok:#1F7A54;}
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:16px 14px}
  header .inner{max-width:760px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .appbanner{width:100%;background:#1B3A6B;line-height:0}
  .appbanner img{width:100%;display:block}
  .brandmark{height:30px;width:auto;display:block;flex-shrink:0}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px}
  header h1{font-size:16px;margin:0} header p{margin:2px 0 0;font-size:11px;opacity:.82}
  .wrap{max-width:760px;margin:0 auto;padding:16px 14px 60px}
  .count{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:bold;margin:4px 2px 14px}
  .count .dot{width:11px;height:11px;border-radius:50%;background:var(--ok);animation:pulse 1.4s infinite}
  @keyframes pulse{0%{opacity:.35}50%{opacity:1}100%{opacity:.35}}
  .card{background:#fff;border:1px solid var(--line);border-left:4px solid var(--ok);border-radius:12px;padding:14px;margin-bottom:11px}
  .card .top{display:flex;align-items:center;gap:11px}
  .av{width:40px;height:40px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:13px;flex-shrink:0}
  .card h3{margin:0;font-size:15px} .card .role{font-size:12px;color:var(--muted)}
  .card .dur{margin-left:auto;text-align:right} .card .dur b{font-size:16px;color:var(--navy)} .card .dur span{display:block;font-size:11px;color:var(--muted)}
  .card .meta{display:flex;flex-wrap:wrap;gap:14px;margin-top:11px;font-size:12.5px;color:var(--muted)}
  .card .meta .v{font-weight:bold;color:var(--orange);text-transform:uppercase;letter-spacing:.4px}
  .card .meta a{color:var(--navy);font-weight:bold;text-decoration:none}
  .empty{text-align:center;color:var(--muted);font-size:14px;padding:56px 20px;line-height:1.6}
  .refresh{font-size:11px;color:var(--muted);text-align:center;margin-top:16px}
  /* branded gate — same family as the MyYacht owner login */
  .gate{position:fixed;inset:0;background:#101B3A;display:none;flex-direction:column;overflow-y:auto;z-index:10}
  .gate.show{display:flex}
  .gatehero{flex:1 0 auto;display:flex;align-items:center;justify-content:center;padding:26px 20px 34px;
    background:linear-gradient(160deg, rgba(16,27,58,.88) 0%, rgba(26,43,92,.72) 55%, rgba(16,27,58,.94) 100%),
      url("everywhen.jpg") center 40%/cover no-repeat, #101B3A;}
  .gate .g{background:rgba(255,255,255,.98);border-radius:18px;box-shadow:0 20px 60px rgba(5,12,35,.55);padding:40px 34px 32px;max-width:410px;width:100%;text-align:center;border-top:4px solid var(--orange)}
  .gate .eyebrow{font-size:11px;font-weight:bold;letter-spacing:4px;color:var(--orange);margin-bottom:6px}
  .gate h3{margin:0 0 4px;color:var(--navy);font-size:32px;font-weight:900;letter-spacing:-.5px}
  .gate .tagline{margin:0 0 26px;color:var(--muted);font-size:13px;font-style:italic}
  .gate .sub{font-size:12px;color:var(--muted);margin:0 0 10px;text-transform:uppercase;letter-spacing:1.5px;font-weight:bold}
  .gate input{width:100%;border:1.5px solid var(--line);border-radius:11px;padding:14px;font-size:15px;text-align:center;font-family:inherit}
  .gate input:focus{outline:none;border-color:var(--orange)}
  .gate button{width:100%;margin-top:12px;border:0;background:var(--orange);color:#fff;font-weight:bold;font-size:15px;padding:14px;border-radius:11px;cursor:pointer}
  .gate .contact{margin-top:22px;font-size:12.5px;color:var(--muted);line-height:1.6}
  .gate .contact b{color:var(--orange)}
  .footer-banner{width:100%;background:#1B3A6B;line-height:0}
  .footer-banner img{width:100%;display:block}
</style>
</head>
<body>
<div class="appbanner"><img src="banner.jpg" alt="Marine HQ — Vessel Management & Marine Services"></div>
<header><div class="inner"><img class="brandmark" src="logo-mark.png" alt="Marine HQ"><div><h1>Crew on Shift</h1><p>Live — who's clocked in right now</p></div></div></header>
<div class="wrap">
  <div class="count"><span class="dot"></span><span id="countTxt">Loading…</span></div>
  <div id="list"></div>
  <div class="refresh" id="refresh"></div>
</div>
<div class="footer-banner"><img src="footer-banner.jpg" alt="Marine HQ"></div>

<div class="gate show" id="gate">
  <div class="appbanner"><img src="banner.jpg" alt="Marine HQ — Vessel Management &amp; Marine Services"></div>
  <div class="gatehero">
    <div class="g">
      <div class="eyebrow">MARINE HQ</div>
      <h3>Crew on Shift</h3>
      <p class="tagline">Who's on the clock, right now.</p>
      <div class="sub">Enter your passcode</div>
      <input id="gk" type="password" placeholder="Passcode" onkeydown="if(event.key==='Enter')unlock()">
      <button onclick="unlock()">View the board</button>
      <p class="contact">Need a hand? We're always here.<br><b>0439 748 387</b> · <b>yachtsupport@marinehq.com.au</b></p>
    </div>
  </div>
  <div class="footer-banner"><img src="footer-banner.jpg" alt="Marine HQ"></div>
</div>

<script>
var API="https://script.google.com/macros/s/AKfycbx5sC5b4rIF1tcMPWRdM9hpc8Lwj26TP7w8ikc0nR1KLyYNDv0CagCZYD3uBfmbQCxh/exec";
var KEY=(function(){try{return localStorage.getItem("mhq_crew_key")||"";}catch(e){return "";}})();
function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function initials(n){var w=(n||"?").replace(/[^A-Za-z ]/g,"").trim().split(/\s+/).filter(Boolean);return ((w[0]||"?")[0]+((w[1]||"")[0]||"")).toUpperCase();}
function pad(n){return (n<10?"0":"")+n;}
function since(ms){var d=new Date(ms),h=d.getHours(),m=d.getMinutes(),ap=h<12?"am":"pm",hh=h%12;if(hh===0)hh=12;return hh+":"+pad(m)+" "+ap;}
function dur(mins){var h=Math.floor(mins/60),m=mins%60;return (h?h+"h ":"")+m+"m";}
function unlock(){var v=(document.getElementById("gk").value||"").trim();if(!v)return;KEY=v;try{localStorage.setItem("mhq_crew_key",v);}catch(e){}document.getElementById("gate").classList.remove("show");load();}
function load(){
  if(!KEY){document.getElementById("gate").classList.add("show");return;}
  fetch(API+"?fn=crewonshift&key="+encodeURIComponent(KEY)+"&_="+Date.now()).then(function(r){return r.json();}).then(function(j){
    if(!j||j.locked||j.ok===false){KEY="";try{localStorage.removeItem("mhq_crew_key");}catch(e){}document.getElementById("gate").classList.add("show");return;}
    var on=j.onShift||[];
    document.getElementById("countTxt").textContent = on.length ? (on.length+(on.length===1?" crew member":" crew members")+" on the clock") : "No one on the clock right now";
    var list=document.getElementById("list");
    if(!on.length){ list.innerHTML='<div class="empty">Nobody is clocked in at the moment.<br>Crew appear here the moment they clock in.</div>'; }
    else { list.innerHTML=on.map(function(s){
      var mapLink = (s.lat!==""&&s.lat!=null) ? '<a href="https://www.google.com/maps?q='+s.lat+','+s.lng+'" target="_blank">📍 View on map</a>' : '<span>📍 No location</span>';
      return '<div class="card"><div class="top"><div class="av">'+esc(initials(s.crew))+'</div>'+
        '<div style="flex:1"><h3>'+esc(s.crew)+'</h3><div class="role">On '+esc(s.vessel)+'</div></div>'+
        '<div class="dur"><b>'+dur(s.minutes)+'</b><span>since '+since(s.inAt)+'</span></div></div>'+
        '<div class="meta"><span class="v">'+esc(s.vessel)+'</span>'+mapLink+(s.loc?('<span>'+esc(s.loc)+'</span>'):'')+'</div></div>';
    }).join(""); }
    document.getElementById("refresh").textContent="Updated "+since(Date.now())+" · refreshes every 20s";
  }).catch(function(){ document.getElementById("countTxt").textContent="Couldn't load — check your connection."; });
}
load(); setInterval(load, 20000);
</script>
</body>
</html>
